# ═══════════════════════════════════════════════════
#  OmniEdge (全域工联) — Production Docker Compose
# ═══════════════════════════════════════════════════

services:
  # ─── Backend API ──────────────────────────────────
  agent-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: omniedge-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8900:8900"
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
    depends_on:
      agent-postgres:
        condition: service_healthy
      agent-redis:
        condition: service_healthy

  # ─── PostgreSQL ───────────────────────────────────
  agent-postgres:
    image: postgres:15
    container_name: omniedge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omniedge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis ────────────────────────────────────────
  agent-redis:
    image: redis:7
    container_name: omniedge-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
